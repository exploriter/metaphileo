<!doctype html>
<html lang="en" class="antialiased h-full">
<head>
   <meta charset="UTF-8"/>
   <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <title>metaphileo</title>
</head>
<body class="min-h-full flex flex-col p-4 sm:p-6">
<div class="bg-[url(/noise.webp)] pointer-events-none z-[-1] absolute inset-0 bg-size-[180px] bg-repeat opacity-[0.035]"></div>
<div>
   <header class="text-center mt-22 mb-12 max-w-lg mx-auto">
      <h1 class="text-[42px] leading-13 text-blue-800 font-[350] tracking-tight mb-2">Metaphileo</h1>
      <p class="font-light text-balance">A contemplative prompt generator for metaphysical and philosophical
         inquiry.</p>
   </header>

   <main class="max-w-3xl mx-auto">
      <div class="flex flex-col items-center justify-center gap-12">
         <article id="inquiry"
                  class="text-xl leading-[1.4] p-9 bg-blue-50/50 text-blue-950/90 border border-slate-200/50 rounded"></article>
         <div class="font-sans">
            <button
                    id="new-inquiry"
                    type="button"
                    class="select-none text-sm tracking-tight rounded-sm flex gap-1.5 items-center justify-center text-nowrap border lg:active:translate-y-px lg:active:scale-[.99] text-neutral-700 border-neutral-400/40 bg-white/50 hover:bg-neutral-100/50 hover:text-neutral-900 [box-shadow:hsl(218,13%,50%,0.1)_0_-2px_0_0_inset] dark:[box-shadow:hsl(218,13%,70%,0.08)_0_-2px_0_0_inset] hover:[box-shadow:none] h-9 pl-3 pr-2 w-full lg:w-fit"
            >
               New Inquiry
               <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" class="size-3.5">
                  <rect width="256" height="256" fill="none"/>
                  <polyline points="96 48 176 128 96 208" fill="none" stroke="currentColor" stroke-linecap="round"
                            stroke-linejoin="round" stroke-width="12"/>
               </svg>
            </button>
         </div>
      </div>
   </main>

   <footer></footer>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
